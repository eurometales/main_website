# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm run build"
  publish = "dist"

# Proxy API: evita CORS; el navegador llama a eurometales.com y la función reenvía a Railway
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/offer"
  to = "/.netlify/functions/offer"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
